name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: deploy_main
  cancel-in-progress: true

env:
  FRONTEND_DIR: nyscClearance_frontend
  BACKEND_DIR: nyscClearance_backend
  FE_BUILD_OUT: nyscClearance_frontend/dist
  FE_REMOTE_DIR: /home/sahab/web/nyscclearance.sahabs.tech
  BE_REMOTE_ROOT: /home/sahab/web/api.sahabs.tech
  SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'nysc_clearance' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
  # Frontend build-time envs (adjust if using a domain with HTTPS)
  VITE_API_BASE: https://api.sahabs.tech
  VITE_FRONTEND_URL: https://nyscclearance.sahabs.tech

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            nyscClearance_frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}
          VITE_FRONTEND_URL: ${{ env.VITE_FRONTEND_URL }}
        run: npm run build

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@${{ secrets.SSH_HOST }}" \
            "mkdir -p '$FE_REMOTE_DIR' '$BE_REMOTE_ROOT/nyscClearance_backend' '$BE_REMOTE_ROOT/nyscClearance_backend/staticfiles' '$BE_REMOTE_ROOT/nyscClearance_backend/media'"

      - name: Upload frontend build
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -az --delete -e "ssh -p $SSH_PORT" \
            "$FE_BUILD_OUT/" "$SSH_USER@${{ secrets.SSH_HOST }}:$FE_REMOTE_DIR/"

      - name: Upload backend source
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -az --delete -e "ssh -p $SSH_PORT" \
            --exclude "__pycache__/" --exclude "*.pyc" --exclude ".venv/" \
            --exclude "media/" --exclude "staticfiles/" \
            "$BACKEND_DIR/" "$SSH_USER@${{ secrets.SSH_HOST }}:$BE_REMOTE_ROOT/nyscClearance_backend/"

      - name: Install backend deps, migrate, collectstatic, restart
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -t -p "$SSH_PORT" "$SSH_USER@${{ secrets.SSH_HOST }}" bash -lc "
            set -euo pipefail
            cd '$BE_REMOTE_ROOT'
            # Ensure venv exists
            if [ ! -d 'venv' ]; then python3 -m venv venv; fi
            venv/bin/pip install --upgrade pip
            venv/bin/pip install -r nyscClearance_backend/requirements.txt
            # Run migrations and collectstatic (settings.py loads .env automatically)
            venv/bin/python nyscClearance_backend/manage.py migrate --noinput
            venv/bin/python nyscClearance_backend/manage.py collectstatic --noinput
            # Restart app and reload nginx
            sudo systemctl restart '${{ env.SERVICE_NAME }}'
            sudo systemctl reload nginx || true
          "

